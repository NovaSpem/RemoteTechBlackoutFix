RT_PLASMA_SETTINGS
{
	// Force the mod to be enabled (ignores KSP settings)
	// false - respect KSP settings (plasmaBlackout in difficulty settings)
	// true - always process plasma regardless of KSP settings
	forceEnable = false

	// Lower plasma intensity threshold (signal attenuation begins)
	plasmaMinValue = 350

	// Upper plasma intensity threshold (complete loss of connection)
	plasmaMaxValue = 2000

	// Show on-screen messages
	// true - show messages about entering plasma, reestablishing connection, etc.
	// false - do not show messages
	showMessages = true

	// Debug logging to the KSP console
	// true - display detailed plasma status information every tick
	// false - do not display (recommended for regular play)
	debugLog = false
}